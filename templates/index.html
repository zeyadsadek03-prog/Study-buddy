<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Buddy — AI Quiz Generator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
      <h1>Study Buddy</h1>
      <button type="button" id="themeToggle" class="theme-toggle">Light</button>
    </div>
    <p>Upload a PDF. Source loads automatically — just click <strong>Generate quiz</strong>.</p>

    <form id="sourceForm">
      <div class="field">
        <label for="pdf">PDF</label>
        <input type="file" id="pdf" name="pdf" accept=".pdf" />
      </div>

      <div class="actions">
        <button type="button" id="quizBtn">Generate quiz</button>
      </div>
    </form>

    <div id="status"></div>
    <div id="result"></div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const quizBtn = document.getElementById('quizBtn');
    const themeToggle = document.getElementById('themeToggle');
    let currentToken = '';
    let sourceReady = false;

    (function applySavedTheme() {
      const saved = localStorage.getItem('study-buddy-theme');
      if (saved === 'light') {
        document.documentElement.classList.add('light');
        themeToggle.textContent = 'Dark';
      } else {
        document.documentElement.classList.remove('light');
        themeToggle.textContent = 'Light';
      }
    })();

    themeToggle.addEventListener('click', () => {
      const isLight = document.documentElement.classList.toggle('light');
      localStorage.setItem('study-buddy-theme', isLight ? 'light' : 'dark');
      themeToggle.textContent = isLight ? 'Dark' : 'Light';
    });

    function setSourceReady() {
      sourceReady = true;
      quizBtn.disabled = false;
    }

    function setSourceMissing() {
      sourceReady = false;
      quizBtn.disabled = true;
    }

    async function loadSource() {
      statusEl.textContent = 'Loading...';
      const form = document.getElementById('sourceForm');
      const formData = new FormData(form);
      const hasFile = formData.get('pdf').size > 0;
      if (!hasFile) {
        statusEl.textContent = 'Please choose a PDF first.';
        setSourceMissing();
        return;
      }
      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load source');
        currentToken = data.token || '';
        statusEl.textContent = 'Source loaded.';
        setSourceReady();
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
        setSourceMissing();
      }
    }

    async function generateQuiz() {
      if (!sourceReady) {
        statusEl.textContent = 'Please upload a PDF first.';
        return;
      }
      statusEl.textContent = 'Generating quiz...';
      try {
        const res = await fetch('/quiz', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: currentToken }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to generate quiz');
        renderQuiz(JSON.parse(data.quiz || '[]'));
        statusEl.textContent = 'Quiz ready.';
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
      }
    }

    function renderQuiz(quiz) {
      if (!Array.isArray(quiz) || !quiz.length) {
        resultEl.innerHTML = '<p>No quiz generated.</p>';
        return;
      }
      let html = '<div class="quiz">';
      quiz.forEach((q, i) => {
        html += '<div class="question">';
        html += '<p><strong>' + (i + 1) + '.</strong> ' + escapeHtml(q.q) + '</p>';
        (q.options || []).forEach((opt, idx) => {
          html += '<label><input type="radio" name="q' + i + '" value="' + escapeHtml(opt) + '" /> ' + escapeHtml(opt) + '</label><br />';
        });
        html += '<button type="button" class="check" data-q="' + i + '">Check</button>';
        html += '<span class="feedback" id="feedback-' + i + '"></span>';
        html += '</div>';
      });
      html += '</div>';
      resultEl.innerHTML = html;

      resultEl.querySelectorAll('.check').forEach(btn => {
        btn.addEventListener('click', () => {
          const qIdx = btn.dataset.q;
          const chosen = resultEl.querySelector('input[name="q' + qIdx + '"]:checked');
          const fb = document.getElementById('feedback-' + qIdx);
          if (!chosen) {
            fb.textContent = 'Please choose an answer.';
            fb.className = 'feedback error';
            return;
          }
          const chosenLetter = (chosen.value || '').trim().charAt(0).toUpperCase();
          const answerLetter = (quiz[qIdx].answer || '').trim().charAt(0).toUpperCase();
          const isCorrect = chosenLetter && answerLetter && chosenLetter === answerLetter;
          if (isCorrect) {
            fb.textContent = 'Correct!';
            fb.className = 'feedback ok';
          } else {
            fb.textContent = 'Wrong. Correct: ' + (quiz[qIdx].answer || '').trim();
            fb.className = 'feedback error';
          }
          resultEl.querySelectorAll('input[name="q' + qIdx + '"]').forEach(input => input.disabled = true);
          btn.disabled = true;
        });
      });
    }

    function escapeHtml(text) {
      if (text == null) return '';
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    document.getElementById('pdf').addEventListener('change', loadSource);
    document.getElementById('quizBtn').addEventListener('click', generateQuiz);
    setSourceMissing();
  </script>
</body>
</html>
